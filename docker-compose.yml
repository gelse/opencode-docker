services:
  opencode:
    container_name: opencode
    build:
      context: ./build
      dockerfile: Dockerfile
    image: opencode:latest
    volumes:
      - /:/host:ro
      - opencode_data:/root/.opencode
    ports:
      - "8088:8088"
    stdin_open: true
    tty: true

volumes:
  opencode_data:
